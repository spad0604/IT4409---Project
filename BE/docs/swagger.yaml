swagger: "2.0"
info:
  title: IT4409 Jira-Clone API
  description: |
    Backend API cho hệ thống quản lý dự án kiểu Jira.
    Clean Architecture (Go) + PostgreSQL (Supabase).
    
    **Hướng dẫn xác thực:**
    1. Gọi `/api/auth/register` hoặc `/api/auth/login` để lấy JWT token.
    2. Nhấn nút "Authorize" ở góc trên, nhập: `Bearer <token>`.
    3. Tất cả API có khóa 🔒 đều yêu cầu JWT.
  version: "2.0"
  contact:
    name: IT4409 Team
basePath: /
schemes:
  - http

securityDefinitions:
  BearerAuth:
    description: "Nhập JWT token. Ví dụ: Bearer eyJhbGciOiJI..."
    type: apiKey
    name: Authorization
    in: header

# ════════════════════════════════════════════════
#  DEFINITIONS (Cấu trúc dữ liệu)
# ════════════════════════════════════════════════
definitions:
  Envelope:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      data: {}

  AuthData:
    type: object
    properties:
      token:
        type: string
      user:
        $ref: "#/definitions/UserDTO"

  UserDTO:
    type: object
    properties:
      id:
        type: string
      email:
        type: string
      name:
        type: string
      avatar_url:
        type: string
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time

  Project:
    type: object
    properties:
      id:
        type: string
      name:
        type: string
      key:
        type: string
      description:
        type: string
      type:
        type: string
        enum: [kanban, scrum]
      lead_id:
        type: string
      icon:
        type: string
      created_by:
        type: string
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time

  ProjectMember:
    type: object
    properties:
      project_id:
        type: string
      user_id:
        type: string
      role:
        type: string
        enum: [admin, member, viewer]
      joined_at:
        type: string
        format: date-time

  Board:
    type: object
    properties:
      id:
        type: string
      projectId:
        type: string
      name:
        type: string
      isDefault:
        type: boolean
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time

  BoardColumn:
    type: object
    properties:
      id:
        type: string
      boardId:
        type: string
      name:
        type: string
      position:
        type: integer
      statusMap:
        type: string
        enum: [todo, in_progress, in_review, done]
      createdAt:
        type: string
        format: date-time

  BoardDetail:
    type: object
    properties:
      board:
        $ref: "#/definitions/Board"
      columns:
        type: array
        items:
          $ref: "#/definitions/BoardColumn"

  Label:
    type: object
    properties:
      id:
        type: string
      projectId:
        type: string
      name:
        type: string
      color:
        type: string
      createdAt:
        type: string
        format: date-time

  Issue:
    type: object
    properties:
      id:
        type: string
      projectId:
        type: string
      issueNumber:
        type: integer
      key:
        type: string
        example: "PROJ-1"
      type:
        type: string
        enum: [epic, story, task, bug, subtask]
      status:
        type: string
        enum: [todo, in_progress, in_review, done, cancelled]
      priority:
        type: string
        enum: [critical, high, medium, low, trivial]
      title:
        type: string
      description:
        type: string
      assigneeId:
        type: string
      reporterId:
        type: string
      parentId:
        type: string
      sprintId:
        type: string
      sortOrder:
        type: number
      dueDate:
        type: string
        format: date-time
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time

  Comment:
    type: object
    properties:
      id:
        type: string
      issueId:
        type: string
      userId:
        type: string
      content:
        type: string
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time

  Attachment:
    type: object
    properties:
      id:
        type: string
      issueId:
        type: string
      uploadedBy:
        type: string
      filename:
        type: string
      fileSize:
        type: integer
      mimeType:
        type: string
      storagePath:
        type: string
      createdAt:
        type: string
        format: date-time

# ════════════════════════════════════════════════
#  PATHS (API Endpoints)
# ════════════════════════════════════════════════
paths:

  # ── AUTH (Người A) ─────────────────────────────
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Đăng ký tài khoản mới
      consumes: [application/json]
      produces: [application/json]
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [email, password, name]
            properties:
              email:
                type: string
                example: user@example.com
              password:
                type: string
                example: MyPassword123
              name:
                type: string
                example: Nguyễn Văn A
      responses:
        201:
          description: Đăng ký thành công
          schema:
            allOf:
              - $ref: "#/definitions/Envelope"
              - properties:
                  data:
                    $ref: "#/definitions/AuthData"
        400:
          description: Dữ liệu không hợp lệ
        409:
          description: Email đã tồn tại

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Đăng nhập
      consumes: [application/json]
      produces: [application/json]
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [email, password]
            properties:
              email:
                type: string
                example: user@example.com
              password:
                type: string
                example: MyPassword123
      responses:
        200:
          description: Đăng nhập thành công, trả về JWT token
          schema:
            allOf:
              - $ref: "#/definitions/Envelope"
              - properties:
                  data:
                    $ref: "#/definitions/AuthData"
        401:
          description: Sai email hoặc mật khẩu

  /api/auth/change-password:
    post:
      tags: [Auth]
      summary: Đổi mật khẩu
      security: [{BearerAuth: []}]
      consumes: [application/json]
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            properties:
              old_password:
                type: string
              new_password:
                type: string
      responses:
        200:
          description: Đổi mật khẩu thành công
        401:
          description: Mật khẩu cũ sai

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Làm mới JWT token
      security: [{BearerAuth: []}]
      produces: [application/json]
      responses:
        200:
          description: Token mới
        401:
          description: Token hết hạn

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Đăng xuất
      security: [{BearerAuth: []}]
      responses:
        200:
          description: Đăng xuất thành công

  # ── USERS (Người A) ────────────────────────────
  /api/users/me:
    get:
      tags: [Users]
      summary: Xem hồ sơ cá nhân
      security: [{BearerAuth: []}]
      produces: [application/json]
      responses:
        200:
          description: Thông tin người dùng hiện tại
          schema:
            allOf:
              - $ref: "#/definitions/Envelope"
              - properties:
                  data:
                    $ref: "#/definitions/UserDTO"
        401:
          description: Chưa đăng nhập
    patch:
      tags: [Users]
      summary: Cập nhật hồ sơ cá nhân
      security: [{BearerAuth: []}]
      consumes: [application/json]
      parameters:
        - in: body
          name: body
          schema:
            type: object
            properties:
              name:
                type: string
              avatar_url:
                type: string
      responses:
        200:
          description: Cập nhật thành công

  /api/users/{userID}:
    get:
      tags: [Users]
      summary: Xem thông tin người dùng khác
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: userID
          type: string
          required: true
      responses:
        200:
          description: Thông tin người dùng
        404:
          description: Không tìm thấy

  /api/users:
    get:
      tags: [Users]
      summary: Tìm kiếm người dùng
      security: [{BearerAuth: []}]
      parameters:
        - in: query
          name: search
          type: string
          required: true
          description: Từ khóa tìm kiếm (tên hoặc email)
        - in: query
          name: page
          type: integer
          default: 1
        - in: query
          name: per_page
          type: integer
          default: 20
      responses:
        200:
          description: Danh sách người dùng phù hợp

  # ── PROJECTS (Người B) ─────────────────────────
  /api/projects:
    post:
      tags: [Projects]
      summary: Tạo dự án mới
      description: Tạo dự án + khởi tạo counter + thêm người tạo làm admin.
      security: [{BearerAuth: []}]
      consumes: [application/json]
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [name, key]
            properties:
              name:
                type: string
                example: Dự án Kanban
              key:
                type: string
                example: KANBAN
              description:
                type: string
                example: Quản lý công việc theo phương pháp Kanban
              type:
                type: string
                enum: [kanban, scrum]
                default: kanban
      responses:
        201:
          description: Tạo dự án thành công
          schema:
            $ref: "#/definitions/Project"
        401:
          description: Chưa đăng nhập
    get:
      tags: [Projects]
      summary: Liệt kê dự án của tôi
      security: [{BearerAuth: []}]
      responses:
        200:
          description: Danh sách dự án mà người dùng là thành viên
          schema:
            type: array
            items:
              $ref: "#/definitions/Project"

  /api/projects/{projectID}:
    get:
      tags: [Projects]
      summary: Chi tiết dự án
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: projectID
          type: string
          required: true
      responses:
        200:
          description: Thông tin dự án
          schema:
            $ref: "#/definitions/Project"
        403:
          description: Không có quyền
        404:
          description: Không tìm thấy
    patch:
      tags: [Projects]
      summary: Cập nhật dự án
      description: "Yêu cầu quyền: admin"
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: projectID
          type: string
          required: true
        - in: body
          name: body
          schema:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              icon:
                type: string
      responses:
        200:
          description: Cập nhật thành công
        403:
          description: Không có quyền admin
    delete:
      tags: [Projects]
      summary: Xóa dự án (xóa mềm)
      description: "Yêu cầu quyền: admin"
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: projectID
          type: string
          required: true
      responses:
        204:
          description: Xóa thành công
        403:
          description: Không có quyền admin

  # ── PROJECT MEMBERS (Người B) ──────────────────
  /api/projects/{projectID}/members:
    get:
      tags: [Project Members]
      summary: Liệt kê thành viên
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: projectID
          type: string
          required: true
      responses:
        200:
          description: Danh sách thành viên
          schema:
            type: array
            items:
              $ref: "#/definitions/ProjectMember"
    post:
      tags: [Project Members]
      summary: Thêm thành viên
      description: "Yêu cầu quyền: admin"
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: projectID
          type: string
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            properties:
              userId:
                type: string
              role:
                type: string
                enum: [admin, member, viewer]
      responses:
        201:
          description: Thêm thành viên thành công
        403:
          description: Không có quyền admin

  /api/projects/{projectID}/members/{userID}:
    put:
      tags: [Project Members]
      summary: Đổi vai trò thành viên
      description: "Yêu cầu quyền: admin"
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: projectID
          type: string
          required: true
        - in: path
          name: userID
          type: string
          required: true
        - in: body
          name: body
          schema:
            type: object
            properties:
              role:
                type: string
                enum: [admin, member, viewer]
      responses:
        200:
          description: Đổi vai trò thành công
    delete:
      tags: [Project Members]
      summary: Xóa thành viên khỏi dự án
      description: "Yêu cầu quyền: admin"
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: projectID
          type: string
          required: true
        - in: path
          name: userID
          type: string
          required: true
      responses:
        204:
          description: Xóa thành viên thành công

  # ── BOARDS (Người B) ───────────────────────────
  /api/projects/{projectID}/boards:
    post:
      tags: [Boards]
      summary: Tạo bảng Kanban mới
      description: Tự động tạo 4 cột mặc định (To Do, In Progress, In Review, Done). Yêu cầu quyền member+.
      security: [{BearerAuth: []}]
      consumes: [application/json]
      parameters:
        - in: path
          name: projectID
          type: string
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [name]
            properties:
              name:
                type: string
                example: Sprint Board
      responses:
        201:
          description: Tạo bảng thành công
          schema:
            $ref: "#/definitions/Board"
    get:
      tags: [Boards]
      summary: Liệt kê bảng trong dự án
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: projectID
          type: string
          required: true
      responses:
        200:
          description: Danh sách bảng
          schema:
            type: array
            items:
              $ref: "#/definitions/Board"

  /api/boards/{boardID}:
    get:
      tags: [Boards]
      summary: Chi tiết bảng + danh sách cột
      description: Trả về bảng kèm tất cả cột, dùng để render giao diện Kanban.
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: boardID
          type: string
          required: true
      responses:
        200:
          description: Bảng + cột
          schema:
            $ref: "#/definitions/BoardDetail"
    patch:
      tags: [Boards]
      summary: Cập nhật bảng
      description: "Yêu cầu quyền: admin"
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: boardID
          type: string
          required: true
        - in: body
          name: body
          schema:
            type: object
            properties:
              name:
                type: string
      responses:
        200:
          description: Cập nhật thành công
    delete:
      tags: [Boards]
      summary: Xóa bảng
      description: "Yêu cầu quyền: admin"
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: boardID
          type: string
          required: true
      responses:
        204:
          description: Xóa thành công

  # ── COLUMNS (Người B) ──────────────────────────
  /api/boards/{boardID}/columns:
    post:
      tags: [Board Columns]
      summary: Thêm cột vào bảng
      description: "Yêu cầu quyền: admin"
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: boardID
          type: string
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [name, statusMap]
            properties:
              name:
                type: string
                example: Testing
              position:
                type: integer
                example: 3
              statusMap:
                type: string
                enum: [todo, in_progress, in_review, done]
      responses:
        201:
          description: Thêm cột thành công
          schema:
            $ref: "#/definitions/BoardColumn"

  /api/boards/{boardID}/columns/{columnID}:
    patch:
      tags: [Board Columns]
      summary: Sửa tên/trạng thái cột
      description: "Yêu cầu quyền: admin"
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: boardID
          type: string
          required: true
        - in: path
          name: columnID
          type: string
          required: true
        - in: body
          name: body
          schema:
            type: object
            properties:
              name:
                type: string
              statusMap:
                type: string
                enum: [todo, in_progress, in_review, done]
      responses:
        200:
          description: Sửa cột thành công
    delete:
      tags: [Board Columns]
      summary: Xóa cột
      description: "Yêu cầu quyền: admin"
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: boardID
          type: string
          required: true
        - in: path
          name: columnID
          type: string
          required: true
      responses:
        204:
          description: Xóa cột thành công

  /api/boards/{boardID}/columns/reorder:
    put:
      tags: [Board Columns]
      summary: Sắp xếp lại thứ tự cột (kéo thả)
      description: Gửi mảng columnIds theo thứ tự mới. Yêu cầu quyền member+.
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: boardID
          type: string
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            properties:
              columnIds:
                type: array
                items:
                  type: string
                example: ["col-uuid-3", "col-uuid-1", "col-uuid-2", "col-uuid-4"]
      responses:
        200:
          description: Sắp xếp lại thành công

  # ── LABELS (Người B) ───────────────────────────
  /api/projects/{projectID}/labels:
    post:
      tags: [Labels]
      summary: Tạo nhãn cho dự án
      description: "Yêu cầu quyền: admin"
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: projectID
          type: string
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [name]
            properties:
              name:
                type: string
                example: Bug
              color:
                type: string
                example: "#ef4444"
                default: "#6366f1"
      responses:
        201:
          description: Tạo nhãn thành công
          schema:
            $ref: "#/definitions/Label"
    get:
      tags: [Labels]
      summary: Liệt kê nhãn của dự án
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: projectID
          type: string
          required: true
      responses:
        200:
          description: Danh sách nhãn
          schema:
            type: array
            items:
              $ref: "#/definitions/Label"

  /api/labels/{labelID}:
    patch:
      tags: [Labels]
      summary: Sửa nhãn
      description: "Yêu cầu quyền: admin"
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: labelID
          type: string
          required: true
        - in: body
          name: body
          schema:
            type: object
            properties:
              name:
                type: string
              color:
                type: string
      responses:
        200:
          description: Sửa nhãn thành công
    delete:
      tags: [Labels]
      summary: Xóa nhãn
      description: "Yêu cầu quyền: admin"
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: labelID
          type: string
          required: true
      responses:
        204:
          description: Xóa nhãn thành công

  /api/issues/{issueKey}/labels:
    post:
      tags: [Labels]
      summary: Gắn nhãn vào công việc
      description: "Yêu cầu quyền: member+"
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: issueKey
          type: string
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            properties:
              labelId:
                type: string
      responses:
        201:
          description: Gắn nhãn thành công

  /api/issues/{issueKey}/labels/{labelID}:
    delete:
      tags: [Labels]
      summary: Gỡ nhãn khỏi công việc
      description: "Yêu cầu quyền: member+"
      security: [{BearerAuth: []}]
      parameters:
        - in: path
          name: issueKey
          type: string
          required: true
        - in: path
          name: labelID
          type: string
          required: true
      responses:
        204:
          description: Gỡ nhãn thành công

  # ── ISSUES ──────────────────────────────────────
  /api/projects/{projectID}/issues:
    post:
      tags: [Issues]
      summary: Tạo công việc mới
      security: [{BearerAuth: []}]
      consumes: [application/json]
      parameters:
        - {in: path, name: projectID, type: string, required: true}
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [title]
            properties:
              title: {type: string, example: "Fix login bug"}
              type: {type: string, enum: [epic, story, task, bug, subtask], default: task}
              priority: {type: string, enum: [critical, high, medium, low, trivial], default: medium}
              description: {type: string}
              assigneeId: {type: string}
              parentId: {type: string}
              sprintId: {type: string}
              dueDate: {type: string, format: date-time}
      responses:
        201: {description: Tạo thành công, schema: {$ref: "#/definitions/Issue"}}
        400: {description: Dữ liệu không hợp lệ}
    get:
      tags: [Issues]
      summary: Liệt kê công việc (bộ lọc + phân trang)
      security: [{BearerAuth: []}]
      parameters:
        - {in: path, name: projectID, type: string, required: true}
        - {in: query, name: status, type: string, description: "todo, in_progress, in_review, done, cancelled"}
        - {in: query, name: type, type: string, description: "epic, story, task, bug, subtask"}
        - {in: query, name: priority, type: string}
        - {in: query, name: assignee, type: string, description: "UUID hoặc 'none'"}
        - {in: query, name: sprint, type: string, description: "UUID hoặc 'backlog'"}
        - {in: query, name: search, type: string}
        - {in: query, name: sort, type: string, default: created_at}
        - {in: query, name: order, type: string, default: desc}
        - {in: query, name: page, type: integer, default: 1}
        - {in: query, name: per_page, type: integer, default: 50}
      responses:
        200: {description: Danh sách công việc}

  /api/issues/{issueKey}:
    get:
      tags: [Issues]
      summary: Chi tiết công việc
      security: [{BearerAuth: []}]
      parameters:
        - {in: path, name: issueKey, type: string, required: true, description: "Ví dụ: PROJ-1"}
      responses:
        200: {description: Chi tiết, schema: {$ref: "#/definitions/Issue"}}
        404: {description: Không tìm thấy}
    patch:
      tags: [Issues]
      summary: Cập nhật công việc
      security: [{BearerAuth: []}]
      consumes: [application/json]
      parameters:
        - {in: path, name: issueKey, type: string, required: true}
        - in: body
          name: body
          schema:
            type: object
            properties:
              title: {type: string}
              description: {type: string}
              type: {type: string}
              priority: {type: string}
              assigneeId: {type: string}
              parentId: {type: string}
              sprintId: {type: string}
              sortOrder: {type: number}
              dueDate: {type: string, format: date-time}
      responses:
        200: {description: Cập nhật thành công}
    delete:
      tags: [Issues]
      summary: Xóa mềm công việc
      security: [{BearerAuth: []}]
      parameters:
        - {in: path, name: issueKey, type: string, required: true}
      responses:
        200: {description: Xóa thành công}

  /api/issues/{issueKey}/status:
    put:
      tags: [Issues]
      summary: Chuyển trạng thái công việc
      security: [{BearerAuth: []}]
      consumes: [application/json]
      parameters:
        - {in: path, name: issueKey, type: string, required: true}
        - in: body
          name: body
          schema:
            type: object
            properties:
              status: {type: string, enum: [todo, in_progress, in_review, done, cancelled]}
      responses:
        200: {description: Chuyển trạng thái thành công}

  /api/issues/{issueKey}/assign:
    put:
      tags: [Issues]
      summary: Gán/bỏ gán người thực hiện
      security: [{BearerAuth: []}]
      consumes: [application/json]
      parameters:
        - {in: path, name: issueKey, type: string, required: true}
        - in: body
          name: body
          schema:
            type: object
            properties:
              assigneeId: {type: string, description: "UUID hoặc null để bỏ gán"}
      responses:
        200: {description: Gán thành công}

  /api/issues/{issueKey}/subtasks:
    get:
      tags: [Issues]
      summary: Liệt kê công việc con
      security: [{BearerAuth: []}]
      parameters:
        - {in: path, name: issueKey, type: string, required: true}
      responses:
        200: {description: Danh sách subtasks}

  # ── COMMENTS ───────────────────────────────────
  /api/issues/{issueKey}/comments:
    post:
      tags: [Comments]
      summary: Thêm bình luận
      security: [{BearerAuth: []}]
      consumes: [application/json]
      parameters:
        - {in: path, name: issueKey, type: string, required: true}
        - in: body
          name: body
          required: true
          schema:
            type: object
            properties:
              content: {type: string, example: "Đã xem xong, cần sửa thêm."}
      responses:
        201: {description: Thêm thành công, schema: {$ref: "#/definitions/Comment"}}
    get:
      tags: [Comments]
      summary: Liệt kê bình luận
      security: [{BearerAuth: []}]
      parameters:
        - {in: path, name: issueKey, type: string, required: true}
        - {in: query, name: page, type: integer, default: 1}
        - {in: query, name: per_page, type: integer, default: 20}
      responses:
        200: {description: Danh sách bình luận}

  /api/comments/{commentID}:
    patch:
      tags: [Comments]
      summary: Sửa bình luận (chỉ tác giả)
      security: [{BearerAuth: []}]
      consumes: [application/json]
      parameters:
        - {in: path, name: commentID, type: string, required: true}
        - in: body
          name: body
          schema:
            type: object
            properties:
              content: {type: string}
      responses:
        200: {description: Sửa thành công}
    delete:
      tags: [Comments]
      summary: Xóa bình luận (tác giả hoặc admin)
      security: [{BearerAuth: []}]
      parameters:
        - {in: path, name: commentID, type: string, required: true}
      responses:
        200: {description: Xóa thành công}

  # ── ATTACHMENTS ────────────────────────────────
  /api/issues/{issueKey}/attachments:
    post:
      tags: [Attachments]
      summary: Tải lên tệp đính kèm
      security: [{BearerAuth: []}]
      consumes: [multipart/form-data]
      parameters:
        - {in: path, name: issueKey, type: string, required: true}
        - {in: formData, name: file, type: file, required: true, description: "Tệp cần tải lên (max 10MB)"}
      responses:
        201: {description: Tải lên thành công, schema: {$ref: "#/definitions/Attachment"}}
        400: {description: Tệp quá lớn hoặc không hợp lệ}
    get:
      tags: [Attachments]
      summary: Liệt kê tệp đính kèm
      security: [{BearerAuth: []}]
      parameters:
        - {in: path, name: issueKey, type: string, required: true}
      responses:
        200: {description: Danh sách tệp}

  /api/attachments/{attachmentID}:
    get:
      tags: [Attachments]
      summary: Tải xuống tệp
      security: [{BearerAuth: []}]
      produces: [application/octet-stream]
      parameters:
        - {in: path, name: attachmentID, type: string, required: true}
      responses:
        200: {description: Nội dung tệp}
        404: {description: Không tìm thấy}
    delete:
      tags: [Attachments]
      summary: Xóa tệp đính kèm
      security: [{BearerAuth: []}]
      parameters:
        - {in: path, name: attachmentID, type: string, required: true}
      responses:
        204: {description: Xóa thành công}

  # ── SEARCH ─────────────────────────────────────
  /api/search:
    get:
      tags: [Search]
      summary: Tìm kiếm toàn cục (issues + projects)
      security: [{BearerAuth: []}]
      parameters:
        - {in: query, name: q, type: string, required: true, description: "Từ khóa tìm kiếm"}
        - {in: query, name: type, type: string, description: "Loại: issues, projects (mặc định tất cả)"}
        - {in: query, name: project_id, type: string, description: "Giới hạn trong dự án"}
      responses:
        200: {description: Kết quả tìm kiếm}

  # ── WEBSOCKET ──────────────────────────────────
  /api/ws:
    get:
      tags: [WebSocket]
      summary: Kết nối WebSocket thời gian thực
      description: |
        Upgrade HTTP → WebSocket. Truyền JWT qua query param `token`.
        Server sẽ broadcast sự kiện khi issue/comment thay đổi.
      parameters:
        - {in: query, name: token, type: string, required: true, description: "JWT token"}
      responses:
        101: {description: Switching Protocols (WebSocket)}
        401: {description: Token không hợp lệ}

  # ── HEALTH ─────────────────────────────────────
  /api/health:
    get:
      tags: [System]
      summary: Kiểm tra sức khỏe hệ thống
      produces: [application/json]
      responses:
        200:
          description: Hệ thống hoạt động bình thường
